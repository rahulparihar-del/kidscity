<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded white background tile -->
  <rect width="64" height="64" rx="14" ry="14" fill="#ffffff"/>

  <!-- Soft drop-shadow illusion: slightly offset pink blob behind K -->
  <!-- K — Pink/Magenta (brand-pink #D6226A) -->
  <!-- Vertical stem of K -->
  <rect x="8" y="10" width="7" height="34" rx="3.5" fill="#D6226A"/>
  <!-- Upper arm of K -->
  <path d="M15 27 L30 10" stroke="#F4813A" stroke-width="7" stroke-linecap="round"/>
  <!-- Lower arm of K -->
  <path d="M15 27 L30 44" stroke="#2DB84B" stroke-width="7" stroke-linecap="round"/>

  <!-- C — Blue (#1AABF0) -->
  <path
    d="M56 20 A14 14 0 1 0 56 44"
    stroke="#1AABF0"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Small orange sun dot above C (matches logo sun) -->
  <circle cx="54" cy="10" r="4.5" fill="#F5A623"/>
  <!-- Sun rays -->
  <line x1="54" y1="3"  x2="54" y2="1"  stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="59" y1="5"  x2="60.5" y2="3.5" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="61" y1="10" x2="63" y2="10" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="59" y1="15" x2="60.5" y2="16.5" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="49" y1="5"  x2="47.5" y2="3.5" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
</svg>